# DKonsole single-manifest install
# Plain apply:
#   kubectl apply -f https://raw.githubusercontent.com/flaucha/DKonsole/v1.6.0/deploy/dkonsole.yaml
#
# Optional ingress rendering:
#   DKONSOLE_DOMAIN=dkonsole.example.com \
#   bash <(curl -fsSL https://raw.githubusercontent.com/flaucha/DKonsole/v1.6.0/scripts/render-manifest.sh) \
#     https://raw.githubusercontent.com/flaucha/DKonsole/v1.6.0/deploy/dkonsole.yaml | kubectl apply -f -
apiVersion: v1
kind: Namespace
metadata:
  name: dkonsole
  labels:
    app.kubernetes.io/name: dkonsole
---
apiVersion: v1
kind: Service
metadata:
  name: dkonsole
  namespace: dkonsole
  labels:
    app.kubernetes.io/name: dkonsole
    app.kubernetes.io/instance: dkonsole
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dkonsole
    app.kubernetes.io/instance: dkonsole
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dkonsole
  namespace: dkonsole
  labels:
    app.kubernetes.io/name: dkonsole
    app.kubernetes.io/instance: dkonsole
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dkonsole
      app.kubernetes.io/instance: dkonsole
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dkonsole
        app.kubernetes.io/instance: dkonsole
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 2000
      containers:
        - name: dkonsole
          image: dkonsole/dkonsole:1.6.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: AUTH_SECRET_NAME
              value: dkonsole-auth
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Uncomment to enable historical Prometheus metrics.
            # - name: PROMETHEUS_URL
            #   value: http://prometheus-server.monitoring.svc.cluster.local:9090
            # DKONSOLE_ALLOWED_ORIGINS_ENV
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: auth-volume
              mountPath: /etc/dkonsole/auth
              readOnly: true
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: auth-volume
          secret:
            secretName: dkonsole-auth
            optional: true
        - name: tmp-volume
          emptyDir: {}
