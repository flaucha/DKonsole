name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Escaneo diario a las 2 AM
    - cron: '0 2 * * *'

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend - Go dependencies
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd backend
          govulncheck ./...

      # Backend - Trivy filesystem scan
      - name: Trivy scan - Backend
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            aquasec/trivy:0.64.1 fs \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            /workspace/backend

      # Deshabilitado temporalmente - problemas de permisos
      # - name: Upload Trivy results to GitHub Security
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   with:
      #     sarif_file: 'trivy-backend-results.sarif'
      #     category: 'trivy-backend'

      # Frontend - npm audit
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: npm audit
        run: |
          cd frontend
          npm audit --audit-level=high --production
        continue-on-error: true

      - name: Trivy scan - Frontend
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            aquasec/trivy:0.64.1 fs \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            /workspace/frontend

      # Deshabilitado temporalmente - problemas de permisos
      # - name: Upload Frontend Trivy results
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   with:
      #     sarif_file: 'trivy-frontend-results.sarif'
      #     category: 'trivy-frontend'

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dkonsole:${{ github.sha }} .

      - name: Trivy scan - Container
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.64.1 image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            dkonsole:${{ github.sha }}

      # Deshabilitado temporalmente - problemas de permisos
      # - name: Upload Container scan results
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   with:
      #     sarif_file: 'trivy-container-results.sarif'
      #     category: 'trivy-container'

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v5
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
